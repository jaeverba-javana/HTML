<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anuncio Asado Trifásico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --fire-main: #ff5722;
      --fire-light: #ffeb3b;
      --fire-dark: #bf360c;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      height: 100dvh;
    }

    /* Contenedor móvil con imagen de fondo */
    .mobile-ad {
      width: 100%;
      max-width: 400px;
      height: 100dvh;
      max-height: 800px;
      /* Se añade la imagen de fondo con un degradado oscuro para que el texto resalte */
      background: linear-gradient(to bottom, rgba(17, 17, 17, 0.5) 0%, rgba(42, 8, 0, 0.9) 100%),
        url('https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80') center/cover no-repeat;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    }

    /* Tipografía especial */
    .font-title {
      font-family: 'Bebas Neue', cursive;
    }

    /* Animación de fuego en el texto */
    .text-fire {
      color: var(--fire-light);
      text-shadow: 0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px var(--fire-light),
        0 0 40px var(--fire-main),
        0 0 80px var(--fire-main),
        0 0 90px var(--fire-dark);
      animation: flicker 1.5s infinite alternate;
    }

    @keyframes flicker {

      0%,
      19%,
      21%,
      23%,
      25%,
      54%,
      56%,
      100% {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--fire-light), 0 0 40px var(--fire-main), 0 0 80px var(--fire-main);
      }

      20%,
      24%,
      55% {
        text-shadow: none;
      }
    }

    /* Partículas de fuego (Chispas) */
    .ember {
      position: absolute;
      bottom: -10px;
      background-color: var(--fire-main);
      border-radius: 50%;
      opacity: 0;
      filter: blur(1px);
      animation: float-up linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
        background-color: var(--fire-light);
      }

      50% {
        background-color: var(--fire-main);
      }

      100% {
        transform: translateY(-800px) scale(0.5);
        opacity: 0;
        background-color: var(--fire-dark);
      }
    }

    /* Estilos para la capa de carne inferior y efecto de profundidad */
    .meat-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 45%;
      background-image: url('https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?auto=format&fit=crop&w=800&q=80');
      background-size: cover;
      background-position: center bottom;
      z-index: 1;
      /* Máscara de degradado para fundir el borde superior de la imagen */
      -webkit-mask-image: linear-gradient(to top, black 30%, transparent 100%);
      mask-image: linear-gradient(to top, black 30%, transparent 100%);
    }

    /* Capa oscura sobre la carne inferior para asegurar que el botón resalte */
    .meat-bottom::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(17, 17, 17, 0.95) 5%, rgba(17, 17, 17, 0.4) 50%, transparent 100%);
    }

    /* Efectos visuales de profundidad para las chispas */
    #embers-container-back .ember {
      filter: blur(2px);
      opacity: 0.5;
    }

    #embers-container-front .ember {
      filter: blur(0.5px);
      opacity: 1;
    }

    /* Animaciones de entrada */
    .slide-in-left {
      animation: slideInLeft 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .slide-in-right {
      animation: slideInRight 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .pop-in {
      animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes slideInLeft {
      0% {
        transform: translateX(-100px);
        opacity: 0;
      }

      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      0% {
        transform: translateX(100px);
        opacity: 0;
      }

      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* Retrasos de animación */
    .delay-1 {
      animation-delay: 0.5s;
    }

    .delay-2 {
      animation-delay: 1s;
    }

    .delay-3 {
      animation-delay: 1.5s;
    }

    .delay-4 {
      animation-delay: 2s;
    }

    .delay-5 {
      animation-delay: 2.5s;
    }

    /* Pulso continuo para el botón */
    .pulse-btn {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7);
      }

      70% {
        transform: scale(1.05);
        box-shadow: 0 0 0 15px rgba(255, 87, 34, 0);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 87, 34, 0);
      }
    }

    .food-icon {
      filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.5));
    }
  </style>
</head>

<body>

  <div class="mobile-ad flex flex-col items-center justify-between py-8 px-4 relative">
    <!-- Chispas traseras (detrás de la carne inferior) -->
    <div id="embers-container-back" class="absolute inset-0 pointer-events-none z-0"></div>

    <!-- Imagen de carne fundida en la parte inferior -->
    <div class="meat-bottom pointer-events-none"></div>

    <!-- Chispas delanteras (frente a la carne inferior) -->
    <div id="embers-container-front" class="absolute inset-0 pointer-events-none z-[2]"></div>

    <!-- Encabezado -->
    <div class="z-10 text-center w-full mt-2 slide-in-left">
      <div
        class="bg-red-600 text-white text-sm font-bold uppercase tracking-widest py-1 px-4 rounded-full inline-block mb-3 border border-red-400">
        🔥 ¡Este próximo Domingo! 🔥
      </div>
      <h1 class="font-title text-6xl text-fire tracking-wider leading-none mb-1">
        ASADOS
      </h1>
      <h2 class="font-title text-4xl text-white tracking-widest bg-black bg-opacity-50 inline-block px-3 rounded">
        AL CARBÓN
      </h2>
    </div>

    <!-- Plato Principal -->
    <div class="z-10 flex flex-col items-center w-full pop-in delay-1 my-4">
      <h3 class="text-2xl font-black text-yellow-400 uppercase italic text-center drop-shadow-lg mb-2">
        Menú Especial Almuerzo
      </h3>
      <div
        class="bg-black bg-opacity-70 border border-orange-500 rounded-xl p-4 w-full text-center shadow-[0_0_15px_rgba(255,87,34,0.4)] backdrop-blur-sm">
        <h4 class="font-title text-4xl text-orange-400 mb-3 tracking-wide">Trifásico</h4>
        <ul class="text-white text-lg font-bold space-y-2">
          <li class="flex items-center justify-center gap-2">
            <span class="text-2xl food-icon">🥩</span> Carne de Res
          </li>
          <li class="flex items-center justify-center gap-2 text-gray-300">+</li>
          <li class="flex items-center justify-center gap-2">
            <span class="text-2xl food-icon">🍖</span> Carne de Cerdo
          </li>
          <li class="flex items-center justify-center gap-2 text-gray-300">+</li>
          <li class="flex items-center justify-center gap-2">
            <span class="text-2xl food-icon">🥓</span> Costillas BBQ
          </li>
        </ul>
      </div>
    </div>

    <!-- Precios -->
    <div class="z-10 w-full flex justify-center gap-3 slide-in-right delay-2">
      <div
        class="bg-gradient-to-br from-yellow-400 to-orange-600 rounded-full w-20 h-20 flex flex-col items-center justify-center text-black font-black border-2 border-white shadow-lg transform rotate-[-5deg]">
        <span class="text-2xl leading-none">25k</span>
      </div>
      <div
        class="bg-gradient-to-br from-orange-500 to-red-600 rounded-full w-24 h-24 flex flex-col items-center justify-center text-white font-black border-2 border-yellow-300 shadow-lg z-10 scale-110">
        <span class="text-3xl leading-none">30k</span>
      </div>
      <div
        class="bg-gradient-to-br from-yellow-400 to-orange-600 rounded-full w-20 h-20 flex flex-col items-center justify-center text-black font-black border-2 border-white shadow-lg transform rotate-[5deg]">
        <span class="text-2xl leading-none">35k</span>
      </div>
    </div>

    <!-- Acompañamientos -->
    <div class="z-10 text-center w-full slide-in-left delay-3 mt-4">
      <p class="text-gray-300 text-sm uppercase tracking-widest mb-1 bg-black bg-opacity-50 inline-block px-2 rounded">
        Acompañado de:</p>
      <p
        class="text-white font-bold text-lg leading-tight bg-gradient-to-r from-transparent via-black to-transparent py-2">
        🥔 Papa <span class="text-orange-500 mx-1">•</span> 🍠 Yuca
      </p>
    </div>

    <!-- Footer / CTA -->
    <!-- <div class="z-10 w-full mt-4 pop-in delay-4 flex flex-col items-center">
      <button
        class="pulse-btn w-[80%] bg-gradient-to-r from-orange-600 to-red-600 text-white font-bold text-xl py-3 rounded-full border-2 border-yellow-400 uppercase tracking-wider shadow-lg">
        ¡Reserva tu almuerzo!
      </button>
    </div> -->

  </div>

  <script>
    // Script para generar chispas de fuego animadas con efecto de profundidad 3D
    function createEmber(containerId, isFront) {
      const container = document.getElementById(containerId);
      const ember = document.createElement('div');
      ember.classList.add('ember');

      // Tamaño aleatorio (las delanteras pueden ser un poco más grandes para dar perspectiva)
      const baseSize = isFront ? 4 : 2;
      const size = Math.random() * 5 + baseSize;
      ember.style.width = `${size}px`;
      ember.style.height = `${size}px`;

      // Posición horizontal aleatoria
      ember.style.left = `${Math.random() * 100}%`;

      // Duración de la animación aleatoria
      const duration = Math.random() * 3 + 2; // entre 2s y 5s
      ember.style.animationDuration = `${duration}s`;

      // Retraso aleatorio
      ember.style.animationDelay = `${Math.random() * 2}s`;

      container.appendChild(ember);

      // Eliminar la chispa después de que termine la animación para no saturar el DOM
      setTimeout(() => {
        if (ember.parentNode) {
          ember.parentNode.removeChild(ember);
        }
      }, duration * 1000);
    }

    function spawnEmbers() {
      // Decide aleatoriamente si la chispa va en la capa trasera o delantera
      // Esto hace que las chispas pasen "entre" la carne de la parte inferior
      if (Math.random() > 0.4) {
        createEmber('embers-container-front', true);
      } else {
        createEmber('embers-container-back', false);
      }
    }

    // Crear chispas iniciales distribuidas en ambas capas
    for (let i = 0; i < 15; i++) {
      createEmber('embers-container-back', false);
      createEmber('embers-container-front', true);
    }

    // Crear nuevas chispas continuamente
    setInterval(spawnEmbers, 150);
  </script>
</body>

</html>
